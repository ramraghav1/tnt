<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="card">
    <p-toolbar styleClass="mb-6">
        <ng-template #start>
            <span class="font-semibold text-xl">Configuration Types</span>
        </ng-template>
        <ng-template #end>
            <button pButton label="New Configuration Type" icon="pi pi-plus" severity="success" (click)="openNew()"></button>
        </ng-template>
    </p-toolbar>

    <p-table
        #dt
        [value]="configurationTypes"
        [paginator]="true"
        [rows]="10"
        [loading]="loading"
        [showGridlines]="true"
        [rowHover]="true"
        responsiveLayout="scroll"
        [globalFilterFields]="['name']"
    >
        <ng-template pTemplate="caption">
            <div class="flex justify-between items-center flex-wrap gap-2">
                <button pButton label="Clear" class="p-button-outlined" icon="pi pi-filter-slash" (click)="clear(dt)"></button>
                <p-iconfield iconPosition="left">
                    <p-inputicon><i class="pi pi-search"></i></p-inputicon>
                    <input #filterInput pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Search..." />
                </p-iconfield>
            </div>
        </ng-template>

        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="name">Name <p-sortIcon field="name"></p-sortIcon></th>
                <th>Status</th>
                <th style="min-width: 8rem">Actions</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-item>
            <tr>
                <td class="font-semibold">{{ item.name }}</td>
                <td>
                    <p-tag [value]="item.isActive ? 'Active' : 'Inactive'" [severity]="item.isActive ? 'success' : 'danger'"></p-tag>
                </td>
                <td>
                    <div class="flex gap-2">
                        <button pButton icon="pi pi-pencil" class="p-button-rounded p-button-success p-button-sm" (click)="editItem(item)"></button>
                        <button pButton icon="pi pi-trash" class="p-button-rounded p-button-danger p-button-sm" (click)="deleteItem(item)"></button>
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="3" class="text-center py-6">
                    <div class="flex flex-col items-center gap-2 text-color-secondary">
                        <i class="pi pi-cog text-4xl"></i>
                        <span>No configuration types found.</span>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<!-- Create / Edit Dialog -->
<p-dialog
    [(visible)]="dialogVisible"
    [header]="editMode ? 'Edit Configuration Type' : 'New Configuration Type'"
    [modal]="true"
    [style]="{ width: '480px' }"
    [closable]="true"
>
    <p-fluid>
        <div class="flex flex-col gap-4 mt-2">
            <div class="flex flex-col gap-2">
                <label for="name" class="font-semibold">Name *</label>
                <input pInputText id="name" [(ngModel)]="selectedItem.name" placeholder="Configuration type name" />
            </div>

            <div class="flex items-center gap-2" *ngIf="editMode">
                <p-toggleswitch id="isActive" [(ngModel)]="selectedItem.isActive"></p-toggleswitch>
                <label for="isActive" class="font-semibold">Active</label>
            </div>
        </div>
    </p-fluid>

    <ng-template pTemplate="footer">
        <button pButton label="Cancel" icon="pi pi-times" class="p-button-text" (click)="dialogVisible = false"></button>
        <button pButton label="Save" icon="pi pi-check" (click)="saveItem()" [disabled]="!selectedItem.name"></button>
    </ng-template>
</p-dialog>
