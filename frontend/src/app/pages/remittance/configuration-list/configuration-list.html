<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="card">
    <p-toolbar styleClass="mb-6">
        <ng-template #start>
            <span class="font-semibold text-xl">Configurations</span>
        </ng-template>
        <ng-template #end>
            <button pButton label="New Configuration" icon="pi pi-plus" severity="success" (click)="openNew()"></button>
        </ng-template>
    </p-toolbar>

    <p-table
        #dt
        [value]="configurations"
        [paginator]="true"
        [rows]="10"
        [loading]="loading"
        [showGridlines]="true"
        [rowHover]="true"
        responsiveLayout="scroll"
        [globalFilterFields]="['configurationTypeName', 'code', 'displayName']"
    >
        <ng-template pTemplate="caption">
            <div class="flex justify-between items-center flex-wrap gap-2">
                <button pButton label="Clear" class="p-button-outlined" icon="pi pi-filter-slash" (click)="clear(dt)"></button>
                <p-iconfield iconPosition="left">
                    <p-inputicon><i class="pi pi-search"></i></p-inputicon>
                    <input #filterInput pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Search..." />
                </p-iconfield>
            </div>
        </ng-template>

        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="configurationTypeName">Configuration Type <p-sortIcon field="configurationTypeName"></p-sortIcon></th>
                <th pSortableColumn="code">Code <p-sortIcon field="code"></p-sortIcon></th>
                <th pSortableColumn="displayName">Display Name <p-sortIcon field="displayName"></p-sortIcon></th>
                <th>Status</th>
                <th style="min-width: 8rem">Actions</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-item>
            <tr>
                <td>
                    <p-tag [value]="item.configurationTypeName" severity="info"></p-tag>
                </td>
                <td class="font-semibold">{{ item.code }}</td>
                <td>{{ item.displayName }}</td>
                <td>
                    <p-tag [value]="item.isActive ? 'Active' : 'Inactive'" [severity]="item.isActive ? 'success' : 'danger'"></p-tag>
                </td>
                <td>
                    <div class="flex gap-2">
                        <button pButton icon="pi pi-pencil" class="p-button-rounded p-button-success p-button-sm" (click)="editItem(item)"></button>
                        <button pButton icon="pi pi-trash" class="p-button-rounded p-button-danger p-button-sm" (click)="deleteItem(item)"></button>
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="5" class="text-center py-6">
                    <div class="flex flex-col items-center gap-2 text-color-secondary">
                        <i class="pi pi-list text-4xl"></i>
                        <span>No configurations found.</span>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<!-- Create / Edit Dialog -->
<p-dialog
    [(visible)]="dialogVisible"
    [header]="editMode ? 'Edit Configuration' : 'New Configuration'"
    [modal]="true"
    [style]="{ width: '520px' }"
    [closable]="true"
>
    <p-fluid>
        <div class="flex flex-col gap-4 mt-2">
            <div class="flex flex-col gap-2" *ngIf="!editMode">
                <label for="configType" class="font-semibold">Configuration Type *</label>
                <p-select
                    id="configType"
                    [options]="configurationTypes"
                    [(ngModel)]="selectedItem.configurationTypeId"
                    optionLabel="name"
                    optionValue="id"
                    placeholder="Select configuration type"
                    [filter]="true"
                    filterPlaceholder="Search..."
                ></p-select>
            </div>

            <div class="flex flex-col gap-2">
                <label for="code" class="font-semibold">Code *</label>
                <input pInputText id="code" [(ngModel)]="selectedItem.code" placeholder="e.g. A, B, C" />
            </div>

            <div class="flex flex-col gap-2">
                <label for="displayName" class="font-semibold">Display Name *</label>
                <input pInputText id="displayName" [(ngModel)]="selectedItem.displayName" placeholder="Display name" />
            </div>

            <div class="flex items-center gap-2" *ngIf="editMode">
                <p-toggleswitch id="isActive" [(ngModel)]="selectedItem.isActive"></p-toggleswitch>
                <label for="isActive" class="font-semibold">Active</label>
            </div>
        </div>
    </p-fluid>

    <ng-template pTemplate="footer">
        <button pButton label="Cancel" icon="pi pi-times" class="p-button-text" (click)="dialogVisible = false"></button>
        <button pButton label="Save" icon="pi pi-check" (click)="saveItem()"
            [disabled]="!selectedItem.code || !selectedItem.displayName || (!editMode && !selectedItem.configurationTypeId)"></button>
    </ng-template>
</p-dialog>
